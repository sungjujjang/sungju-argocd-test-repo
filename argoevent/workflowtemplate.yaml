apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: discord-forward-twice
  namespace: argo
spec:
  entrypoint: send
  serviceAccountName: discord-workflow-sa
  arguments:
    parameters:
    - name: payload
      value: '{}'
    - name: content
      value: ''
  volumes:
  - name: discord-secret
    secret:
      secretName: discord-secret
  templates:
  - name: send
    container:
      image: curlimages/curl:8.7.1
      env:
      - name: DISCORD_PAYLOAD
        value: "{{workflow.parameters.payload}}"
      - name: DISCORD_CONTENT
        value: "{{workflow.parameters.content}}"
      command:
      - sh
      - -c
      args:
      - |
        set -eu

        WEBHOOK_URL="$(cat /secret/url)"

        if [ "$DISCORD_PAYLOAD" != "{}" ]; then
          printf '%s' "$DISCORD_PAYLOAD" > /tmp/payload.json
        else
          ESCAPED_CONTENT=$(printf '%s' "$DISCORD_CONTENT" | sed 's/\\/\\\\/g; s/"/\\"/g' | awk 'BEGIN { printf "{\"content\":\"" } { printf "%s\\n", $0 } END { printf "\"}" }')
          printf '%s' "$ESCAPED_CONTENT" > /tmp/payload.json
        fi

        curl -k --fail --show-error --silent \
          -H "Content-Type: application/json" \
          -X POST \
          --data-binary @/tmp/payload.json \
          "$WEBHOOK_URL"

        curl -k --fail --show-error --silent \
          -H "Content-Type: application/json" \
          -X POST \
          --data-binary @/tmp/payload.json \
          "$WEBHOOK_URL"
      volumeMounts:
      - name: discord-secret
        mountPath: /secret
        readOnly: true
