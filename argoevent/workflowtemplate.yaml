apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: discord-message
  namespace: argo

spec:
  entrypoint: send

  arguments:
    parameters:
    - name: message
      value: default

  volumes:
  - name: discord-secret
    secret:
      secretName: discord-secret

  templates:
  - name: send

    container:
      image: curlimages/curl:8.7.1

      command:
      - sh
      - -c

      args:
      - |
        WEBHOOK=$(cat /secret/url)

        echo "WEBHOOK=$(cat /secret/url)"

        ls -al /secret

        cat /secret/url

        curl -k \
          -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"{{workflow.parameters.message}}\"}" \
          "$WEBHOOK"

      volumeMounts:
      - name: discord-secret
        mountPath: /secret
