apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: discord-message
  namespace: argo

spec:
  entrypoint: send

  arguments:
    parameters:
    - name: message
      value: default

  volumes:
  - name: discord-secret
    secret:
      secretName: discord-secret

  templates:
  - name: send

    container:
      image: curlimages/curl:8.7.1
      env:
      - name: MESSAGE
        value: "{{workflow.parameters.message}}"

      command:
      - sh
      - -c

      args:
      - |
        set -eu

        WEBHOOK=$(cat /secret/url)

        PAYLOAD=$(printf '%s' "$MESSAGE" | sed 's/\\/\\\\/g; s/"/\\"/g' | awk 'BEGIN { printf "{\"content\":\"" } { printf "%s\\n", $0 } END { printf "\"}" }')

        curl -k \
          --fail \
          --show-error \
          --silent \
          -H "Content-Type: application/json" \
          -X POST \
          -d "$PAYLOAD" \
          "$WEBHOOK"

      volumeMounts:
      - name: discord-secret
        mountPath: /secret
