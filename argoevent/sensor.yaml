apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: discord-forward-sensor
  namespace: argo-events
spec:
  template:
    serviceAccountName: operate-workflow-sa
  dependencies:
  - name: webhook-dep
    eventSourceName: webhook
    eventName: incoming
  triggers:
  - template:
      name: submit-discord-forward-workflow
      argoWorkflow:
        operation: submit
        source:
          resource:
            apiVersion: argoproj.io/v1alpha1
            kind: Workflow
            metadata:
              generateName: discord-forward-
              namespace: argo
            spec:
              workflowTemplateRef:
                name: discord-forward-twice
              arguments:
                parameters:
                - name: payload
                  value: '{}'
    parameters:
    - src:
        dependencyName: webhook-dep
        dataKey: body
      dest: spec.arguments.parameters.0.value
