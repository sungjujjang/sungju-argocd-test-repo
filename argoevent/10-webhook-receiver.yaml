apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-receiver-app
  namespace: argo-webhook-test
data:
  app.py: |
    import html
    import json
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    EVENTS = []
    MAX_EVENTS = 100

    class Handler(BaseHTTPRequestHandler):
        server_version = "webhook-receiver/1.0"

        def _send(self, status, content_type, body):
            encoded = body.encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", content_type)
            self.send_header("Content-Length", str(len(encoded)))
            self.end_headers()
            self.wfile.write(encoded)

        def _record(self):
            length = int(self.headers.get("Content-Length", "0") or "0")
            raw_body = self.rfile.read(length).decode("utf-8", errors="replace")
            event = {
                "time": datetime.now(timezone.utc).isoformat(),
                "method": self.command,
                "path": self.path,
                "headers": {k: v for k, v in self.headers.items()},
                "body": raw_body,
            }
            EVENTS.insert(0, event)
            del EVENTS[MAX_EVENTS:]
            return event

        def do_POST(self):
            event = self._record()
            self._send(200, "application/json", json.dumps({"stored": True, "event": event}, ensure_ascii=False))

        def do_PUT(self):
            self.do_POST()

        def do_PATCH(self):
            self.do_POST()

        def do_GET(self):
            if self.path.startswith("/api/events"):
                self._send(200, "application/json", json.dumps(EVENTS[:20], ensure_ascii=False))
                return

            rows = []
            for event in EVENTS[:20]:
                headers = "\n".join(f"{k}: {v}" for k, v in event["headers"].items())
                rows.append(f"""
                <article>
                  <div class="meta">{html.escape(event["time"])} | {html.escape(event["method"])} {html.escape(event["path"])}</div>
                  <h2>Body</h2>
                  <pre>{html.escape(event["body"])}</pre>
                  <h2>Headers</h2>
                  <pre>{html.escape(headers)}</pre>
                </article>
                """)

            body = f"""<!doctype html>
            <html lang="ko">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Webhook Receiver</title>
              <style>
                body {{ margin: 0; font-family: system-ui, sans-serif; background: #f6f7f9; color: #1f2933; }}
                main {{ max-width: 1080px; margin: 0 auto; padding: 28px 18px; }}
                header {{ display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 18px; }}
                h1 {{ margin: 0; font-size: 26px; }}
                .count {{ color: #586274; font-size: 14px; }}
                article {{ background: #fff; border: 1px solid #d9dee7; border-radius: 8px; padding: 16px; margin: 12px 0; }}
                .meta {{ color: #586274; font-size: 13px; margin-bottom: 12px; }}
                h2 {{ font-size: 14px; margin: 12px 0 6px; }}
                pre {{ overflow: auto; white-space: pre-wrap; word-break: break-word; background: #111827; color: #e5e7eb; padding: 12px; border-radius: 6px; }}
                .empty {{ padding: 28px 0; color: #586274; }}
              </style>
            </head>
            <body>
              <main>
                <header>
                  <h1>Webhook Receiver</h1>
                  <div class="count">stored {len(EVENTS)} events, showing top 20</div>
                </header>
                {''.join(rows) if rows else '<div class="empty">No webhook requests stored yet.</div>'}
              </main>
            </body>
            </html>"""
            self._send(200, "text/html; charset=utf-8", body)

        def log_message(self, format, *args):
            print("%s - %s" % (self.address_string(), format % args), flush=True)

    ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: argo-webhook-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhook-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhook-receiver
    spec:
      containers:
        - name: receiver
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/app.py"]
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: webhook-receiver-app
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver
  namespace: argo-webhook-test
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: webhook-receiver
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 31080
