apiVersion: v1
kind: ServiceAccount
metadata:
  name: operate-workflow-sa
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workflow-submit-role
rules:
- apiGroups:
  - argoproj.io
  resources:
  - workflows
  - workflowtemplates
  verbs:
  - create
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workflow-submit-binding
subjects:
- kind: ServiceAccount
  name: operate-workflow-sa
  namespace: argo-events
roleRef:
  kind: ClusterRole
  name: workflow-submit-role
  apiGroup: rbac.authorization.k8s.io
